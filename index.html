<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jesa</title>

  <link rel="stylesheet" href="style.css?v=19">
</head>

<body>

  <!-- INTRO -->
<div id="intro">
  <div class="intro-content">
    <img src="images/logo.png" alt="Logo Jesa">

    <div class="intro-bar">
      <span></span>
    </div>
  </div>
</div>

  <!-- HEADER -->
  <header class="top">
    <div class="brand">

      <!-- Logo gauche -->
      <div class="left-block">
        <img class="logo" src="images/logo.png" alt="Logo Jesa">
      </div>

      <!-- Contact droite -->
      <div class="contact">
        <a class="email" href="mailto:jeesspro@gmail.com">jeesspro@gmail.com</a>
        <a class="insta" href="https://instagram.com/jesa000" target="_blank" rel="noopener noreferrer">@jesa000</a>
      </div>

    </div>
  </header>

  <!-- CATEGORIES AU MILIEU -->
  <nav class="categories" aria-label="Catégories">

    <a href="#gallery" class="category-img" aria-label="Samples">
      <img class="cat-normal" src="images/samples.png" alt="">
      <img class="cat-hover" src="images/samples-hover.png" alt="">
    </a>

    <a href="#gallery" class="category-img" aria-label="Designs">
      <img class="cat-normal" src="images/designs.png" alt="">
      <img class="cat-hover" src="images/designs-hover.png" alt="">
    </a>

    <a href="#gallery" class="category-img" aria-label="Archive">
      <img class="cat-normal" src="images/products.png" alt="">
      <img class="cat-hover" src="images/products-hover.png" alt="">
    </a>

  </nav>

  <!-- GALERIE -->
  <main class="gallery" id="gallery"></main>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button type="button" class="lb-close" id="lbClose" aria-label="Fermer">×</button>
    <button type="button" class="lb-btn lb-prev" id="lbPrev" aria-label="Image précédente">‹</button>

    <img
      id="lbImg"
      src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
      alt=""
    >

    <button type="button" class="lb-btn lb-next" id="lbNext" aria-label="Image suivante">›</button>
  </div>

  <!-- INTRO script -->
  <script>
    window.addEventListener("load", () => {
      const intro = document.getElementById("intro");

      setTimeout(() => {
        intro.classList.add("hide");
        setTimeout(() => intro.remove(), 400);
      }, 1500);
    });
  </script>

  <!-- Script dynamique -->
  <script src="script.js?v=3"></script>

</body>
</html>
